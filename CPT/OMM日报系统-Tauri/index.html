<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OMM日报系统 v5.5.2</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "微软雅黑", sans-serif; background: #f5f5f7; }
      #splash {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; gap: 20px;
      }
      #splash h1 { font-size: 22px; color: #1d1d1f; }
      #splash p { font-size: 13px; color: #6e6e73; }
      .spinner {
        width: 36px; height: 36px; border: 3px solid #e5e5ea;
        border-top-color: #0a84ff; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .bar {
        width: 260px; height: 6px; background: #e5e5ea; border-radius: 3px; overflow: hidden;
      }
      .bar-fill {
        width: 60%; height: 100%; background: #0a84ff; border-radius: 3px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { width: 20%; opacity: 0.5; }
        50% { width: 90%; opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="spinner"></div>
      <h1>OMM 日报系统</h1>
      <div class="bar"><div class="bar-fill"></div></div>
      <p>正在启动，请稍候...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
