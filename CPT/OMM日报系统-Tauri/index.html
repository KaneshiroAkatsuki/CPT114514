<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>玉衡山科学院管理厅 v5.8.2</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "微软雅黑", sans-serif; background: #f5f5f7; }
      #splash {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; gap: 14px; color: #64748b;
      }
      .startup-loader__halo {
        position: relative; display: grid; width: 72px; height: 72px;
        place-items: center; border-radius: 999px;
      }
      .startup-loader__halo::before {
        position: absolute; inset: 8px; content: "";
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-top-color: rgba(10, 132, 255, 0.9);
        border-radius: inherit;
        box-shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
        animation: startup-spin 1.4s linear infinite;
      }
      .startup-loader__halo::after {
        position: absolute; inset: 18px; content: "";
        border-radius: inherit;
        background: radial-gradient(circle, rgba(10, 132, 255, 0.16), rgba(10, 132, 255, 0) 62%);
        animation: startup-breathe 1.8s ease-in-out infinite;
      }
      .startup-loader__core {
        position: relative; z-index: 1; width: 12px; height: 12px;
        border-radius: 999px; background: #0a84ff;
        box-shadow: 0 0 0 6px rgba(10, 132, 255, 0.09), 0 0 18px rgba(10, 132, 255, 0.28);
      }
      #splash h1 { font-size: 18px; color: #1d1d1f; font-weight: 600; }
      #splash p { font-size: 14px; color: #64748b; font-weight: 500; }
      @keyframes startup-spin { to { transform: rotate(360deg); } }
      @keyframes startup-breathe {
        0%, 100% { opacity: 0.48; transform: scale(0.94); }
        50% { opacity: 1; transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="startup-loader__halo" aria-hidden="true">
        <span class="startup-loader__core"></span>
      </div>
      <h1>玉衡山科学院管理厅</h1>
      <p>正在加载本地账户...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
